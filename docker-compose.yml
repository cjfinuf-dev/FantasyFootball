version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: fantasy_dev
      POSTGRES_DB: fantasy_football
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    working_dir: /code
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
