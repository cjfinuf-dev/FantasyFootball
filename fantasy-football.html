function TradeModuleModal({ isOpen, onClose, trades, setTrades, teamRosters, setTeamRosters, tradeBlock, setTradeBlock, tradeHistory, setTradeHistory }) {
  const [activeTab, setActiveTab] = useState('propose');
  const [partnerTeamId, setPartnerTeamId] = useState(null);
  const [sendIds, setSendIds] = useState([]);
  const [receiveIds, setReceiveIds] = useState([]);
  const [message, setMessage] = useState('');
  const [expiresIn, setExpiresIn] = useState(172800000);
  const [confirmId, setConfirmId] = useState(null);
  const [historyFilter, setHistoryFilter] = useState('all');
  const [expandedHistory, setExpandedHistory] = useState(null);
  const [analyzerTeamA, setAnalyzerTeamA] = useState(USER_TEAM_ID);
  const [analyzerTeamB, setAnalyzerTeamB] = useState(null);
  const [analyzerSendIds, setAnalyzerSendIds] = useState([]);
  const [analyzerReceiveIds, setAnalyzerReceiveIds] = useState([]);

  const tabs = [
    { id: 'propose', label: 'Propose Trade' },
    { id: 'active', label: 'Active Trades' },
    { id: 'analyzer', label: 'Analyzer' },
    { id: 'block', label: 'Trade Block' },
    { id: 'history', label: 'History' },
  ];

  const incomingCount = trades.filter(t => t.toTeamId === USER_TEAM_ID && t.status === 'pending').length;

  const resetPropose = () => { setPartnerTeamId(null); setSendIds([]); setReceiveIds([]); setMessage(''); };

  const handlePropose = () => {
    if (!sendIds.length || !receiveIds.length || !partnerTeamId) return;
    const newTrade = {
      id: 'tr_' + Date.now(), status: 'pending', fromTeamId: USER_TEAM_ID, toTeamId: partnerTeamId,
      offeringPlayerIds: [...sendIds], requestingPlayerIds: [...receiveIds],
      message, proposedAt: Date.now(), expiresAt: Date.now() + expiresIn,
    };
    setTrades(prev => [...prev, newTrade]);
    resetPropose();
    setActiveTab('active');
  };

  const handleAccept = (tradeId) => {
    const trade = trades.find(t => t.id === tradeId);
    if (!trade) return;
    setTeamRosters(prev => {
      const next = deepClone(prev);
      const fromRoster = next[trade.fromTeamId] || [];
      const toRoster = next[trade.toTeamId] || [];
      trade.offeringPlayerIds.forEach(pid => {
        const idx = fromRoster.indexOf(pid);
        if (idx > -1) fromRoster.splice(idx, 1);
        toRoster.push(pid);
      });
      trade.requestingPlayerIds.forEach(pid => {
        const idx = toRoster.indexOf(pid);
        if (idx > -1) toRoster.splice(idx, 1);
        fromRoster.push(pid);
      });
      next[trade.fromTeamId] = fromRoster;
      next[trade.toTeamId] = toRoster;
      return next;
    });
    setTradeHistory(prev => [...prev, { ...trade, status: 'completed', resolvedAt: Date.now() }]);
    setTrades(prev => prev.filter(t => t.id !== tradeId));
    setConfirmId(null);
  };

  const handleReject = (tradeId) => {
    const trade = trades.find(t => t.id === tradeId);
    if (!trade) return;
    setTradeHistory(prev => [...prev, { ...trade, status: 'rejected', resolvedAt: Date.now() }]);
    setTrades(prev => prev.filter(t => t.id !== tradeId));
  };

  const handleWithdraw = (tradeId) => {
    const trade = trades.find(t => t.id === tradeId);
    if (!trade) return;
    setTradeHistory(prev => [...prev, { ...trade, status: 'withdrawn', resolvedAt: Date.now() }]);
    setTrades(prev => prev.filter(t => t.id !== tradeId));
  };

  const handleCounter = (trade) => {
    handleReject(trade.id);
    setPartnerTeamId(trade.fromTeamId === USER_TEAM_ID ? trade.toTeamId : trade.fromTeamId);
    setSendIds([]);
    setReceiveIds([]);
    setMessage('Counter to previous offer');
    setActiveTab('propose');
  };

  const suggestFairTrade = () => {
    if (!analyzerTeamA || !analyzerTeamB) return;
    const rosterA = teamRosters[analyzerTeamA] || [];
    const rosterB = teamRosters[analyzerTeamB] || [];
    let best = null;
    let bestFairness = -1;
    for (const a of rosterA) {
      for (const b of rosterB) {
        const f = calcFairness([a], [b]);
        if (f.fairness > bestFairness && f.sideA > 0 && f.sideB > 0) { bestFairness = f.fairness; best = { send: [a], receive: [b] }; }
      }
    }
    if (rosterA.length >= 2 && rosterB.length >= 2) {
      for (let i = 0; i < rosterA.length; i++) for (let j = i+1; j < rosterA.length; j++)
        for (let k = 0; k < rosterB.length; k++) for (let l = k+1; l < rosterB.length; l++) {
          const f = calcFairness([rosterA[i], rosterA[j]], [rosterB[k], rosterB[l]]);
          if (f.fairness > bestFairness && f.sideA > 10) { bestFairness = f.fairness; best = { send: [rosterA[i], rosterA[j]], receive: [rosterB[k], rosterB[l]] }; }
        }
    }
    if (best) { setAnalyzerSendIds(best.send); setAnalyzerReceiveIds(best.receive); }
  };

  const togglePlayer = (playerId, side) => {
    if (side === 'send') setSendIds(prev => prev.includes(playerId) ? prev.filter(id => id !== playerId) : [...prev, playerId]);
    else setReceiveIds(prev => prev.includes(playerId) ? prev.filter(id => id !== playerId) : [...prev, playerId]);
  };

  const aiTradeBlock = useMemo(() => {
    const blocked = [];
    ['t3','t5','t7','t9'].forEach(tid => {
      const roster = teamRosters[tid] || [];
      if (roster.length > 0) blocked.push({ playerId: roster[roster.length - 1], teamId: tid });
      if (roster.length > 2) blocked.push({ playerId: roster[1], teamId: tid });
    });
    return blocked;
  }, [teamRosters]);

  if (!isOpen) return null;

  const renderRosterColumn = (teamId, label, selectedIds, onToggle) => {
    const team = getTeamById(teamId);
    const roster = (teamRosters[teamId] || []).map(id => getPlayerById(id)).filter(Boolean);
    return (
      <div className="ff-tm-column">
        <div className="ff-tm-column-header">
          {team && <span>{team.logo}</span>} {label} {team && <span style={{ fontWeight: 400, opacity: 0.7 }}>({team.wins}-{team.losses})</span>}
        </div>
        <div className="ff-tm-column-list">
          {roster.map(p => (
            <div key={p.id} className={`ff-tm-player-row ${selectedIds.includes(p.id) ? 'selected' : ''}`}
              onClick={() => onToggle(p.id)}>
              <PosBadge pos={p.pos} />
              <span className="p-name">{p.name}</span>
              <span className="p-nfl">{p.team}</span>
              <span className="p-val">{PLAYER_VALUES[p.id]}</span>
            </div>
          ))}
          {roster.length === 0 && <div style={{ padding: 12, fontSize: 11, color: 'var(--text-muted)' }}>No players</div>}
        </div>
      </div>
    );
  };

  return (
    <div className="ff-modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="ff-modal" style={{ maxWidth: 1000 }}>
        <div className="ff-modal-header">
          <h2>{'\u{1F91D}'} Trade Center</h2>
          <button className="ff-modal-close" onClick={onClose}>{'\u{2715}'}</button>
        </div>

        <div className="ff-settings-nav">
          {tabs.map(t => (
            <button key={t.id} className={`ff-settings-tab ${activeTab === t.id ? 'active' : ''}`}
              onClick={() => setActiveTab(t.id)}>
              {t.label}
              {t.id === 'active' && incomingCount > 0 && <span className="ff-badge-count" style={{ marginLeft: 6, transform: 'scale(0.85)' }}>{incomingCount}</span>}
            </button>
          ))}
        </div>

        <div className="ff-modal-body" style={{ maxHeight: 'calc(100vh - 240px)', overflowY: 'auto' }}>

          {/* ===== PROPOSE TAB ===== */}
          {activeTab === 'propose' && (
            <div className="ff-settings-panel">
              <div className="ff-settings-section">
                <div className="ff-settings-section-title">{'\u{1F465}'} Choose a Trade Partner</div>
                <div className="ff-tm-team-grid">
                  {TEAMS.filter(t => t.id !== USER_TEAM_ID).map(t => (
                    <div key={t.id} className={`ff-tm-team-card ${partnerTeamId === t.id ? 'selected' : ''}`}
                      onClick={() => { setPartnerTeamId(t.id); setSendIds([]); setReceiveIds([]); }}>
                      <div className="ff-tm-team-card-logo">{t.logo}</div>
                      <div className="ff-tm-team-card-name">{t.name}</div>
                      <div className="ff-tm-team-card-meta">{t.owner} &middot; {t.wins}-{t.losses}</div>
                    </div>
                  ))}
                </div>
              </div>

              {partnerTeamId && (
                <>
                  <div className="ff-settings-section">
                    <div className="ff-settings-section-title">{'\u{1F3C8}'} Select Players</div>
                    <div className="ff-tm-columns">
                      {renderRosterColumn(USER_TEAM_ID, 'Your Roster', sendIds, id => togglePlayer(id, 'send'))}
                      {renderRosterColumn(partnerTeamId, getTeamById(partnerTeamId)?.name || 'Their Roster', receiveIds, id => togglePlayer(id, 'receive'))}
                    </div>
                  </div>

                  {(sendIds.length > 0 || receiveIds.length > 0) && (
                    <div className="ff-settings-section">
                      <div className="ff-tm-trade-zone">
                        <div className="ff-tm-zone-panel">
                          <h4>You Send</h4>
                          {sendIds.map(id => <TradePlayerChip key={id} playerId={id} onRemove={id => togglePlayer(id, 'send')} />)}
                          {sendIds.length === 0 && <div className="ff-tm-zone-empty">Select players from your roster</div>}
                        </div>
                        <div className="ff-tm-zone-panel">
                          <h4>You Receive</h4>
                          {receiveIds.map(id => <TradePlayerChip key={id} playerId={id} onRemove={id => togglePlayer(id, 'receive')} />)}
                          {receiveIds.length === 0 && <div className="ff-tm-zone-empty">Select players from their roster</div>}
                        </div>
                      </div>
                      {sendIds.length > 0 && receiveIds.length > 0 && <TradeAnalyzerBar sendIds={sendIds} receiveIds={receiveIds} />}
                    </div>
                  )}

                  <div className="ff-settings-section">
                    <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-start' }}>
                      <div style={{ flex: 1, minWidth: 200 }}>
                        <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>Message (optional)</label>
                        <textarea className="ff-tm-message-input" value={message} onChange={e => setMessage(e.target.value)} placeholder="Add a message..." />
                      </div>
                      <div>
                        <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>Expires In</label>
                        <select className="ff-tm-expiry-select" value={expiresIn} onChange={e => setExpiresIn(Number(e.target.value))}>
                          <option value={43200000}>12 hours</option>
                          <option value={86400000}>24 hours</option>
                          <option value={172800000}>48 hours</option>
                          <option value={604800000}>1 week</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </>
              )}
            </div>
          )}

          {/* ===== ACTIVE TRADES TAB ===== */}
          {activeTab === 'active' && (
            <div className="ff-settings-panel">
              {trades.filter(t => t.status === 'pending').length === 0 ? (
                <div style={{ padding: 32, textAlign: 'center', color: 'var(--text-muted)' }}>No active trades. Propose one to get started.</div>
              ) : trades.filter(t => t.status === 'pending').map(trade => {
                const isIncoming = trade.toTeamId === USER_TEAM_ID;
                const fromTeam = getTeamById(trade.fromTeamId);
                const toTeam = getTeamById(trade.toTeamId);
                const { fairness } = calcFairness(trade.offeringPlayerIds, trade.requestingPlayerIds);
                const cls = fairness >= 75 ? 'fair' : fairness >= 50 ? 'uneven' : 'lopsided';
                const remaining = timeUntil(trade.expiresAt);
                const urgent = trade.expiresAt - Date.now() < 21600000;

                return (
                  <div key={trade.id} className={`ff-tm-inbox-card ${isIncoming ? 'incoming' : 'outgoing'}`}>
                    <div className="ff-tm-inbox-header">
                      <div>
                        <span className="ff-tm-status-pill pending">Pending</span>
                        <span style={{ fontSize: 11, color: 'var(--text-muted)', marginLeft: 6 }}>
                          {isIncoming ? 'Incoming' : 'Outgoing'}
                        </span>
                      </div>
                      <span className={`ff-tm-inbox-countdown ${urgent ? 'urgent' : ''}`}>{remaining}</span>
                    </div>
                    <div className="ff-tm-inbox-teams">
                      {fromTeam?.logo} {fromTeam?.name} {'\u{2192}'} {toTeam?.logo} {toTeam?.name}
                    </div>
                    <div className="ff-trade-sides" style={{ margin: '10px 0' }}>
                      <div className="ff-trade-side">
                        <h5>{isIncoming ? 'You Receive' : 'You Send'}</h5>
                        {(isIncoming ? trade.offeringPlayerIds : trade.offeringPlayerIds).map(id => {
                          const p = getPlayerById(id);
                          return p ? <div className="ff-trade-player" key={id}><PosBadge pos={p.pos} /> {p.name} <span style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--copper)' }}>{PLAYER_VALUES[id]}</span></div> : null;
                        })}
                      </div>
                      <div className="ff-trade-side">
                        <h5>{isIncoming ? 'They Want' : 'You Receive'}</h5>
                        {(isIncoming ? trade.requestingPlayerIds : trade.requestingPlayerIds).map(id => {
                          const p = getPlayerById(id);
                          return p ? <div className="ff-trade-player" key={id}><PosBadge pos={p.pos} /> {p.name} <span style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--copper)' }}>{PLAYER_VALUES[id]}</span></div> : null;
                        })}
                      </div>
                    </div>
                    <div className="ff-fairness-bar"><div className="ff-fairness-fill" style={{ width: fairness + '%', background: cls === 'fair' ? 'var(--success-green)' : cls === 'uneven' ? 'var(--warning-amber)' : 'var(--red)' }} /></div>
                    <div className={`ff-tm-fairness-badge ${cls}`} style={{ fontSize: 10, marginTop: 4, marginBottom: 4 }}>{fairness} — {cls === 'fair' ? 'Fair' : cls === 'uneven' ? 'Uneven' : 'Lopsided'}</div>
                    {trade.message && <div className="ff-tm-inbox-message">"{trade.message}"</div>}

                    {confirmId === trade.id ? (
                      <div className="ff-tm-confirm-bar">
                        <span>{'\u{26A0}\u{FE0F}'} Confirm accept? Players will be swapped.</span>
                        <button className="ff-btn ff-btn-copper ff-btn-sm" onClick={() => handleAccept(trade.id)}>Confirm</button>
                        <button className="ff-btn ff-btn-secondary ff-btn-sm" onClick={() => setConfirmId(null)}>Cancel</button>
                      </div>
                    ) : (
                      <div className="ff-tm-inbox-actions">
                        {isIncoming && <button className="ff-btn ff-btn-copper ff-btn-sm" onClick={() => setConfirmId(trade.id)}>Accept</button>}
                        {isIncoming && <button className="ff-btn ff-btn-danger ff-btn-sm" onClick={() => handleReject(trade.id)}>Reject</button>}
                        {isIncoming && <button className="ff-btn ff-btn-secondary ff-btn-sm" onClick={() => handleCounter(trade)}>Counter</button>}
                        {!isIncoming && <button className="ff-btn ff-btn-danger ff-btn-sm" onClick={() => handleWithdraw(trade.id)}>Withdraw</button>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* ===== ANALYZER TAB ===== */}
          {activeTab === 'analyzer' && (
            <div className="ff-settings-panel">
              <div className="ff-settings-section">
                <div className="ff-settings-section-title">{'\u{1F4CA}'} Trade Analyzer</div>
                <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>Team A</label>
                    <select className="ff-tm-expiry-select" value={analyzerTeamA || ''} onChange={e => { setAnalyzerTeamA(e.target.value); setAnalyzerSendIds([]); }}>
                      {TEAMS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>Team B</label>
                    <select className="ff-tm-expiry-select" value={analyzerTeamB || ''} onChange={e => { setAnalyzerTeamB(e.target.value); setAnalyzerReceiveIds([]); }}>
                      <option value="">Select team...</option>
                      {TEAMS.filter(t => t.id !== analyzerTeamA).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'flex-end' }}>
                    <button className="ff-btn ff-btn-copper" onClick={suggestFairTrade} disabled={!analyzerTeamA || !analyzerTeamB}>
                      {'\u{2728}'} Suggest Fair Trade
                    </button>
                  </div>
                </div>
                {analyzerTeamA && analyzerTeamB && (
                  <>
                    <div className="ff-tm-columns">
                      {renderRosterColumn(analyzerTeamA, getTeamById(analyzerTeamA)?.name || 'Team A', analyzerSendIds, id => setAnalyzerSendIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]))}
                      {renderRosterColumn(analyzerTeamB, getTeamById(analyzerTeamB)?.name || 'Team B', analyzerReceiveIds, id => setAnalyzerReceiveIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]))}
                    </div>
                    {(analyzerSendIds.length > 0 || analyzerReceiveIds.length > 0) && (
                      <div className="ff-tm-trade-zone">
                        <div className="ff-tm-zone-panel">
                          <h4>{getTeamById(analyzerTeamA)?.abbr} Sends</h4>
                          {analyzerSendIds.map(id => <TradePlayerChip key={id} playerId={id} onRemove={id => setAnalyzerSendIds(prev => prev.filter(x => x !== id))} />)}
                          {analyzerSendIds.length === 0 && <div className="ff-tm-zone-empty">Select players</div>}
                        </div>
                        <div className="ff-tm-zone-panel">
                          <h4>{getTeamById(analyzerTeamB)?.abbr} Sends</h4>
                          {analyzerReceiveIds.map(id => <TradePlayerChip key={id} playerId={id} onRemove={id => setAnalyzerReceiveIds(prev => prev.filter(x => x !== id))} />)}
                          {analyzerReceiveIds.length === 0 && <div className="ff-tm-zone-empty">Select players</div>}
                        </div>
                      </div>
                    )}
                    {analyzerSendIds.length > 0 && analyzerReceiveIds.length > 0 && <TradeAnalyzerBar sendIds={analyzerSendIds} receiveIds={analyzerReceiveIds} />}
                  </>
                )}
              </div>
            </div>
          )}

          {/* ===== TRADE BLOCK TAB ===== */}
          {activeTab === 'block' && (
            <div className="ff-settings-panel">
              <div className="ff-settings-section">
                <div className="ff-settings-section-title">{'\u{1F4E2}'} Your Trade Block</div>
                <p style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 10 }}>Toggle players you want to move. Other managers see these.</p>
                {(teamRosters[USER_TEAM_ID] || []).map(pid => {
                  const p = getPlayerById(pid);
                  if (!p) return null;
                  const isBlocked = tradeBlock.includes(pid);
                  return (
                    <div key={pid} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
                      <PosBadge pos={p.pos} />
                      <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{p.name}</span>
                      <span style={{ fontSize: 11, color: 'var(--copper)', fontWeight: 600 }}>{PLAYER_VALUES[pid]}</span>
                      <button className={`ff-toggle ${isBlocked ? 'on' : ''}`}
                        onClick={() => setTradeBlock(prev => isBlocked ? prev.filter(id => id !== pid) : [...prev, pid])} />
                    </div>
                  );
                })}
              </div>
              <div className="ff-settings-section">
                <div className="ff-settings-section-title">{'\u{1F310}'} League Trade Block</div>
                {aiTradeBlock.length === 0 ? (
                  <div style={{ padding: 16, textAlign: 'center', color: 'var(--text-muted)', fontSize: 12 }}>No players on the trade block right now.</div>
                ) : (
                  <div className="ff-tm-block-grid">
                    {aiTradeBlock.map(({ playerId, teamId }) => {
                      const p = getPlayerById(playerId);
                      const t = getTeamById(teamId);
                      if (!p || !t) return null;
                      return (
                        <div className="ff-tm-block-card" key={playerId}>
                          <PosBadge pos={p.pos} />
                          <div className="ff-tm-block-info">
                            <div className="ff-tm-block-name">{p.name}</div>
                            <div className="ff-tm-block-team">{t.logo} {t.name} &middot; Val: {PLAYER_VALUES[playerId]}</div>
                          </div>
                          <button className="ff-btn ff-btn-copper ff-btn-sm" onClick={() => {
                            setPartnerTeamId(teamId); setReceiveIds([playerId]); setSendIds([]); setMessage('');
                            setActiveTab('propose');
                          }}>Offer</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ===== HISTORY TAB ===== */}
          {activeTab === 'history' && (
            <div className="ff-settings-panel">
              <div className="ff-tm-filter-bar">
                {['all','completed','rejected','expired','withdrawn'].map(f => (
                  <button key={f} className={`ff-tm-filter-pill ${historyFilter === f ? 'active' : ''}`}
                    onClick={() => setHistoryFilter(f)}>
                    {f.charAt(0).toUpperCase() + f.slice(1)}
                  </button>
                ))}
              </div>
              {tradeHistory.filter(t => historyFilter === 'all' || t.status === historyFilter).length === 0 ? (
                <div style={{ padding: 32, textAlign: 'center', color: 'var(--text-muted)' }}>No trade history to show.</div>
              ) : tradeHistory
                .filter(t => historyFilter === 'all' || t.status === historyFilter)
                .sort((a, b) => (b.resolvedAt || b.proposedAt) - (a.resolvedAt || a.proposedAt))
                .map(trade => {
                  const fromTeam = getTeamById(trade.fromTeamId);
                  const toTeam = getTeamById(trade.toTeamId);
                  const expanded = expandedHistory === trade.id;
                  const { fairness } = calcFairness(trade.offeringPlayerIds, trade.requestingPlayerIds);
                  return (
                    <div className="ff-tm-history-row" key={trade.id}>
                      <div className="ff-tm-history-header" onClick={() => setExpandedHistory(expanded ? null : trade.id)}>
                        <span className={`ff-tm-status-pill ${trade.status}`}>{trade.status}</span>
                        <span style={{ fontWeight: 600 }}>{fromTeam?.logo} {fromTeam?.abbr} {'\u{2194}\u{FE0F}'} {toTeam?.logo} {toTeam?.abbr}</span>
                        <span style={{ color: 'var(--text-muted)' }}>{new Date(trade.resolvedAt || trade.proposedAt).toLocaleDateString()}</span>
                        <span style={{ fontSize: 11, color: 'var(--copper)', fontWeight: 600 }}>{fairness}</span>
                        <span className={`ff-tm-history-arrow ${expanded ? 'open' : ''}`}>{'\u25BC'}</span>
                      </div>
                      {expanded && (
                        <div className="ff-tm-history-detail" style={{ paddingTop: 12 }}>
                          <div className="ff-trade-sides">
                            <div className="ff-trade-side">
                              <h5>{fromTeam?.name} Offered</h5>
                              {trade.offeringPlayerIds.map(id => { const p = getPlayerById(id); return p ? <div className="ff-trade-player" key={id}><PosBadge pos={p.pos} /> {p.name}</div> : null; })}
                            </div>
                            <div className="ff-trade-side">
                              <h5>{toTeam?.name} Offered</h5>
                              {trade.requestingPlayerIds.map(id => { const p = getPlayerById(id); return p ? <div className="ff-trade-player" key={id}><PosBadge pos={p.pos} /> {p.name}</div> : null; })}
                            </div>
                          </div>
                          {trade.message && <div className="ff-tm-inbox-message" style={{ marginTop: 8 }}>"{trade.message}"</div>}
                        </div>
                      )}
                    </div>
                  );
                })}
            </div>
          )}

        </div>

        <div className="ff-modal-footer">
          <div className="ff-modal-footer-left">
            <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
              {trades.filter(t => t.status === 'pending').length} active &middot; {tradeHistory.length} historical
            </span>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {activeTab === 'propose' && partnerTeamId && (
              <>
                <button className="ff-btn ff-btn-secondary" onClick={resetPropose}>Reset</button>
                <button className="ff-btn ff-btn-copper" disabled={!sendIds.length || !receiveIds.length} onClick={handlePropose}>
                  {'\u{1F91D}'} Propose Trade
                </button>
              </>
            )}
            <button className="ff-btn ff-btn-secondary" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

    <footer className="ff-footer">
      <div className="ff-footer-brand">Fantasy <span>League</span> <span style={{ fontSize: 12, fontFamily: 'Inter, sans-serif', fontWeight: 400, opacity: 0.6 }}>2025-26</span></div>
      <div className="ff-footer-links">
        <button className="ff-footer-link">League Rules</button>
        <button className="ff-footer-link" onClick={onOpenSettings}>Scoring</button>
        <button className="ff-footer-link" onClick={onOpenSettings}>Settings</button>

/* ===== APP ROOT ===== */
function App() {
  const [theme, setTheme] = useState(() => {
    try { const s = localStorage.getItem('ff-theme'); return s || 'light'; }
    catch { return 'light'; }
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [tradeModalOpen, setTradeModalOpen] = useState(false);
  const [showAuthModal, setShowAuthModal] = useState(null);
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ff-user')); }
    catch { return null; }
  });
  const [activeLeagueId, setActiveLeagueId] = useState(() => {
    try { return localStorage.getItem('ff-active-league') || 'lg1'; }
    catch { return 'lg1'; }
  });
  const [leagues] = useState(MY_LEAGUES_SEED);

  const [trades, setTrades] = useState(() => {
    try { const s = localStorage.getItem('ff-trades'); return s ? JSON.parse(s) : [...TRADES_SEED]; }
    catch { return [...TRADES_SEED]; }
  });
  const [teamRosters, setTeamRosters] = useState(() => {
    try { const s = localStorage.getItem('ff-team-rosters'); return s ? JSON.parse(s) : deepClone(TEAM_ROSTERS_SEED); }
    catch { return deepClone(TEAM_ROSTERS_SEED); }
  });
  const [tradeBlock, setTradeBlock] = useState(() => {
    try { const s = localStorage.getItem('ff-trade-block'); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [tradeHistory, setTradeHistory] = useState(() => {
    try { const s = localStorage.getItem('ff-trade-history'); return s ? JSON.parse(s) : [...TRADE_HISTORY_SEED]; }
    catch { return [...TRADE_HISTORY_SEED]; }
  });

  useEffect(() => { localStorage.setItem('ff-theme', theme); document.documentElement.dataset.theme = theme; }, [theme]);
  useEffect(() => { if (user) localStorage.setItem('ff-user', JSON.stringify(user)); else localStorage.removeItem('ff-user'); }, [user]);
  useEffect(() => { localStorage.setItem('ff-active-league', activeLeagueId); }, [activeLeagueId]);

  const handleSignOut = () => { setUser(null); localStorage.removeItem('ff-user'); };
  const handleAuth = (u) => { setUser(u); setShowAuthModal(null); };
  useEffect(() => { localStorage.setItem('ff-trades', JSON.stringify(trades)); }, [trades]);
  useEffect(() => { localStorage.setItem('ff-team-rosters', JSON.stringify(teamRosters)); }, [teamRosters]);
  useEffect(() => { localStorage.setItem('ff-trade-block', JSON.stringify(tradeBlock)); }, [tradeBlock]);
  useEffect(() => { localStorage.setItem('ff-trade-history', JSON.stringify(tradeHistory)); }, [tradeHistory]);

  return (
    <>
      <TopNavbar theme={theme} setTheme={setTheme} onOpenSettings={() => setSettingsOpen(true)}
        leagues={leagues} activeLeagueId={activeLeagueId} onSelectLeague={setActiveLeagueId}
        user={user} onShowAuth={setShowAuthModal} onSignOut={handleSignOut} />
      {user ? (
        <>
          <HeroSection onOpenSettings={() => setSettingsOpen(true)} onOpenTradeModal={() => setTradeModalOpen(true)} />
          <div className="ff-main-grid">
            <div className="ff-left">
              <MatchupWidget />
              <PlayerRankings />
              <NewsFeed />
            </div>
            <div className="ff-right">
              <StandingsCard />
              <WaiverWireCard />
              <TradeCenterCard trades={trades} onOpenTradeModal={() => setTradeModalOpen(true)} />
              <PowerRankingsCard />
            </div>
          </div>
          <div style={{ padding: '0 clamp(16px, 4vw, 32px)', maxWidth: 1400, margin: '0 auto' }}>
            <HistoricalStats />
          </div>
        </>
      ) : (
        <div className="ff-hero" style={{ minHeight: 'calc(100vh - 120px)', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>{'\u{1F3C8}'}</div>
          <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 36, fontWeight: 700, color: '#fff', marginBottom: 8 }}>
            Fantasy <span style={{ color: 'var(--brand-tan)' }}>League</span>
          </h1>
          <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: 16, maxWidth: 480, marginBottom: 28 }}>
            Your all-in-one fantasy football dashboard. Manage leagues, analyze trades, track players, and dominate your competition.
          </p>
          <div style={{ display: 'flex', gap: 12 }}>
            <button className="ff-hero-action primary" style={{ fontSize: 15, padding: '14px 28px' }}
              onClick={() => setShowAuthModal('signup')}>Create Account</button>
            <button className="ff-hero-action secondary" style={{ fontSize: 15, padding: '14px 28px' }}
              onClick={() => setShowAuthModal('signin')}>Sign In</button>
          </div>
          <div style={{ marginTop: 40, display: 'flex', gap: 32, color: 'rgba(255,255,255,0.4)', fontSize: 12 }}>
            <div>{'\u{1F4CA}'} 8 League Types</div>
            <div>{'\u{1F91D}'} Full Trade Center</div>
            <div>{'\u{1F4C8}'} 3 Years of Stats</div>
            <div>{'\u{2699}\u{FE0F}'} Custom Scoring</div>
          </div>
        </div>
      )}
      <Footer onOpenSettings={() => setSettingsOpen(true)} />
      <LeagueSettingsModal isOpen={settingsOpen} onClose={() => setSettingsOpen(false)} />
      <TradeModuleModal isOpen={tradeModalOpen} onClose={() => setTradeModalOpen(false)}
        trades={trades} setTrades={setTrades} teamRosters={teamRosters} setTeamRosters={setTeamRosters}
        tradeBlock={tradeBlock} setTradeBlock={setTradeBlock} tradeHistory={tradeHistory} setTradeHistory={setTradeHistory} />
      {showAuthModal && (
        <AuthModal mode={showAuthModal} onClose={() => setShowAuthModal(null)}
          onSwitch={() => setShowAuthModal(prev => prev === 'signin' ? 'signup' : 'signin')}
          onAuth={handleAuth} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
